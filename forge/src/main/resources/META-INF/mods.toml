modLoader = "javafml"
loaderVersion = "${forge_loader_version_range}"
license = "${license}"

[[mods]]
modId = "${fml_mod_id}"
namespace = "${mod_id}"
version = "${mod_version}-${build_variant}+${minecraft_version}"
displayName = "${mod_name}"
authors = "${mod_author}"
description = '''${description}'''

[[dependencies.${fml_mod_id}]]
modId = "forge"
mandatory = true
versionRange = "${forge_loader_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${fml_mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
